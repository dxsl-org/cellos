[graph]
targets = [
  { triple = "riscv64gc-unknown-none-elf" },
  { triple = "aarch64-unknown-none" },
  { triple = "x86_64-unknown-none" },
]

[advisories]
version = 2
# yanked crates are denied by default in 0.15+
# unmaintained/unsound: "all" = check all deps, "workspace" = workspace only
unmaintained = "all"

[licenses]
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MPL-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "0BSD",
  "Zlib",
]

[[licenses.exceptions]]
allow = ["GPL-2.0-only"]
name = "doom"

[[licenses.exceptions]]
# redoxfs uses license-file; vendored in third_party/ under MIT
allow = ["MIT"]
name = "redoxfs"

[bans]
multiple-versions = "warn"
wildcards = "deny"
