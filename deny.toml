[graph]
targets = [
  { triple = "riscv64gc-unknown-none-elf" },
  { triple = "aarch64-unknown-none" },
  { triple = "x86_64-unknown-none" },
]

[advisories]
yanked = "deny"
unsound = "deny"
unmaintained = "warn"

[licenses]
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MPL-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
