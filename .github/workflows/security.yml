name: Security (Weekly)

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo-audit
        uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          arguments: --all-features

  geiger:
    name: Unsafe Regression (cargo-geiger)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-geiger
        run: cargo install --locked cargo-geiger

      - name: Run geiger scan
        run: >
          cargo geiger
          --workspace
          --output-format json
          --target riscv64gc-unknown-none-elf
          -Z build-std=core,alloc
          > geiger.json 2>&1 || true

      - name: Assert no unsafe in cells/
        run: |
          python3 - << 'PYEOF'
          import json, sys
          with open("geiger.json") as f:
              data = json.load(f)
          violations = []
          for pkg in data.get("packages", []):
              src = pkg.get("package", {}).get("manifest_path", "")
              if "cells/" in src:
                  used = pkg.get("unsafety", {}).get("used", {})
                  if used.get("unsafe_used", 0) > 0:
                      violations.append(src)
          if violations:
              print("FAIL: unsafe code found in cells/:")
              for v in violations:
                  print(f"  {v}")
              sys.exit(1)
          print("PASS: no unsafe in cells/")
          PYEOF

      - name: Upload geiger report
        uses: actions/upload-artifact@v4
        with:
          name: geiger-report
          path: geiger.json
