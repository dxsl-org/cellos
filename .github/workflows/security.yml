name: Security (Weekly)

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo-audit
        # v2: v1.4.1 bundles a cargo-audit that can't parse CVSS 4.0 entries
        # now present in the RustSec advisory DB. Ignore list: .cargo/audit.toml.
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: cargo-deny
        # v2 for the same CVSS 4.0 reason (matches ci.yml Security Scan).
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --all-features

  unsafe-ratchet:
    # Replaces the cargo-geiger scan: geiger cannot analyse `-Z build-std`
    # bare-metal targets, and Driver Cells legitimately contain unsafe for
    # MMIO/DMA. The ratchet enforces the real invariant — no unsafe outside
    # the audited allowlist (scripts/check-cells-unsafe-ratchet.py).
    name: Unsafe ratchet (cells/ allowlist must not grow)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check unsafe stays inside the audited allowlist
        run: python3 scripts/check-cells-unsafe-ratchet.py
