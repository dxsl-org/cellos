name: Performance Benchmarks

on:
  schedule:
    # Weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      upload_history:
        description: 'Upload result to perf-history branch'
        required: false
        default: 'true'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Mirrors the gitignored .cargo/config.toml (see ci.yml for the full note):
  # riscv64 kernel + cells are built with relocation-model=pic.
  CARGO_TARGET_RISCV64GC_UNKNOWN_NONE_ELF_RUSTFLAGS: "-C relocation-model=pic"

jobs:
  bench:
    name: Run benchmarks (RV64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          # Pinned to the same nightly as ci.yml — an untagged `nightly` here
          # drifted ahead of the workspace and broke independently.
          toolchain: nightly-2026-05-01
          components: rust-src

      - name: Install QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qemu-system-misc

      - name: Restore perf history
        uses: actions/cache/restore@v4
        with:
          path: perf-results/
          # Unique key per run so save always writes; restore-keys picks the newest match.
          key: perf-results-${{ github.run_id }}
          restore-keys: perf-results-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # service-vfs pulls littlefs2-sys, which cross-compiles vendored C —
      # same toolchain requirements as ci.yml's riscv64 jobs.
      - name: Install cross C compiler for littlefs2-sys
        timeout-minutes: 10
        run: sudo apt-get update -q && sudo apt-get install -y -q gcc-riscv64-unknown-elf

      - name: Build bootstrap + bench cells
        env:
          CC_riscv64gc_unknown_none_elf: riscv64-unknown-elf-gcc
          CFLAGS_riscv64gc_unknown_none_elf: -march=rv64gc -mabi=lp64d -mcmodel=medany -ffreestanding -DLFS_NO_INTRINSICS -I${{ github.workspace }}/third_party/freestanding-include
        run: |
          cargo build --release \
            --target riscv64gc-unknown-none-elf \
            -Z build-std=core,alloc \
            -p app-init -p app-shell -p service-vfs -p service-config \
            -p service-platform -p driver-virtio-blk \
            -p app-bench

      - name: Rebuild kernel with bench-aware ramdisk
        run: |
          REL=target/riscv64gc-unknown-none-elf/release
          # kernel_fs.img is a gitignored build artifact (only init is
          # committed) — assemble the VIFS1 ramdisk from the cells built above.
          # bench + bench-probe MUST live in VIFS1: sys_spawn_pinned resolves
          # through the kernel loader (VIFS1/P2 only, no VFS).
          cp "$REL/app-init" kernel/src/embedded/init
          python3 tools/mkfat32.py kernel/src/embedded/kernel_fs.img \
            "$REL/app-init"          /bin/init \
            "$REL/app-shell"         /bin/shell \
            "$REL/service-vfs"       /bin/vfs \
            "$REL/service-config"    /bin/config \
            "$REL/platform"          /bin/platform \
            "$REL/driver-virtio-blk" /bin/block \
            "$REL/bench"             /bin/bench \
            "$REL/bench-probe"       /bin/bench-probe
          cargo build --release \
            --target riscv64gc-unknown-none-elf \
            -Z build-std=core,alloc \
            -p vicell-kernel

      - name: Generate bench disk image
        run: |
          # Cell-table-only disk: /bin/bench at CELL_TABLE_BASE_LBA.
          # Kernel is passed directly as -kernel; no Limine/FAT partition needed.
          bash scripts/gen-bench-disk.sh \
            target/riscv64gc-unknown-none-elf/release/bench \
            bench-disk.img

      - name: Boot QEMU and capture bench output
        id: bench_run
        timeout-minutes: 10
        run: |
          KERNEL=target/riscv64gc-unknown-none-elf/release/vicell-kernel
          # Direct boot: kernel ELF passed as -kernel (OpenSBI → kernel → init → bench).
          # bench-disk.img contains only the cell bootstrap table (/bin/bench).
          # init reads the cell table and auto-spawns /bin/bench.
          #
          # Capture [bench]/[rt] human-readable lines and bare JSON result lines.
          # print_report emits "[bench] ..." — used for PDR FAIL check.
          # print_json  emits '{"name":...}' with no prefix — used for results JSON.
          OUTPUT=$(timeout 300 qemu-system-riscv64 \
            -machine virt \
            -nographic \
            -bios default \
            -kernel "$KERNEL" \
            -m 256M \
            -drive file=bench-disk.img,format=raw,id=hd0,if=none \
            -device virtio-blk-device,drive=hd0 \
            2>&1 | grep -E '^\[bench\]|^\[rt\]|^\{"name":|^\[boot\] kernel_phys_base' || true)

          # bench_output: [bench] and [rt] lines — FAIL in either fails the PDR check below
          BENCH_LINES=$(echo "$OUTPUT" | grep -E '^\[bench\]|^\[rt\]' || true)
          echo "bench_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BENCH_LINES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Extract JSON lines from the combined output buffer.
          JSON_LINES=$(echo "$OUTPUT" | grep '^{"name":' || echo '[]')
          echo "bench_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$JSON_LINES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Write result file
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p perf-results
          RESULT_FILE="perf-results/perf-${DATE}.json"
          JSON_LINES='${{ steps.bench_run.outputs.bench_json }}'
          printf '{\n  "date": "%s",\n  "commit": "%s",\n  "results": [%s]\n}\n' \
            "$DATE" \
            "${{ github.sha }}" \
            "$JSON_LINES" > "$RESULT_FILE"
          echo "[perf] Result written to $RESULT_FILE"
          cat "$RESULT_FILE"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.run_id }}
          path: perf-results/
          retention-days: 90

      - name: Save perf history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: perf-results/
          key: perf-results-${{ github.run_id }}

      - name: Compare against historical baseline
        run: |
          bash scripts/compare-bench-results.sh perf-results/

      - name: Check PDR targets
        run: |
          OUTPUT="${{ steps.bench_run.outputs.bench_output }}"
          if echo "$OUTPUT" | grep -q "FAIL"; then
            echo "::error::One or more benchmarks exceed PDR targets — see bench output above"
            echo "$OUTPUT"
            exit 1
          else
            echo "[perf] All PDR targets met"
          fi
