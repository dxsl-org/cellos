name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ⚠ Do NOT add a workflow-level RUSTFLAGS here. The RUSTFLAGS env var REPLACES
# (does not merge with) per-target rustflags — a global "-D warnings" silently
# dropped relocation-model=pic (riscv64), code-model=kernel/static (x86_64)
# and +bti,+paca,+pacg (aarch64), breaking every link. Warnings are gated by
# the clippy jobs (`-- -D warnings`) instead.
#
# The CARGO_TARGET_*_RUSTFLAGS below mirror .cargo/config.toml, which is
# GITIGNORED (it carries machine-specific [env] paths) and therefore never
# reaches CI. Target-scoped env vars affect only their own triple, and a
# step-level RUSTFLAGS (e.g. the test-hooks kernel build) still overrides
# them — same precedence as the local config file. Keep the three values in
# sync with .cargo/config.toml.
env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  # riscv64: pic for kernel (la→GOT self-relocation) AND cells (avoids
  # absolute R_RISCV_64 relocations that -pie linking rejects).
  CARGO_TARGET_RISCV64GC_UNKNOWN_NONE_ELF_RUSTFLAGS: "-C relocation-model=pic"
  # x86_64: Limine panics on PIE kernels (permission-split LOAD pages);
  # kernel code model + no red zone + CET landing pads.
  CARGO_TARGET_X86_64_UNKNOWN_NONE_RUSTFLAGS: "-C code-model=kernel -C target-feature=-red-zone,+cet-shstk -C relocation-model=static"
  # aarch64: pic for kernel and cells (matches run-arm-virt.ps1 /
  # build-aarch64-cells.ps1) + BTI/PAC codegen.
  CARGO_TARGET_AARCH64_UNKNOWN_NONE_SOFTFLOAT_RUSTFLAGS: "-C relocation-model=pic -C target-feature=+bti,+paca,+pacg"

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Fast static guard (no build): every Cell's linker base must be off the kernel
      # MMIO identity maps, below RAM, and unique. In the SAS all cells share one page
      # table, so a colliding base silently clobbers MMIO/neighbour PTEs. Runs first so
      # a layout regression fails in seconds, before the expensive clippy/build.
      - name: Check Cell VA layout (SAS)
        run: python3 scripts/check-cell-va-layout.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src,rustfmt,clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all --check

      # clippy executes build scripts: littlefs2-sys (via service-vfs) compiles
      # its vendored C core, so the riscv64 cross gcc must be present even for
      # a lint-only job.
      - name: Install cross C compiler for littlefs2-sys
        timeout-minutes: 10
        run: sudo apt-get update -q && sudo apt-get install -y -q gcc-riscv64-unknown-elf

      - name: Clippy (riscv64 target)
        env:
          CC_riscv64gc_unknown_none_elf: riscv64-unknown-elf-gcc
          # -I …/freestanding-include: Ubuntu's bare-metal gcc ships no libc
          # headers; littlefs includes <string.h>, served by the vendored set.
          CFLAGS_riscv64gc_unknown_none_elf: -march=rv64gc -mabi=lp64d -mcmodel=medany -ffreestanding -DLFS_NO_INTRINSICS -I${{ github.workspace }}/third_party/freestanding-include
        # Same exclusions as the Build job: these crates' build scripts compile
        # vendored C that needs toolchain pieces CI does not have (lua needs
        # signal.h/stdio.h — a full libc, not just the vendored string.h).
        run: >
          cargo clippy
          --workspace
          --exclude app-mlibc-smoke
          --exclude doom
          --exclude tetris-c
          --exclude lua
          --exclude tetris-lua
          --target riscv64gc-unknown-none-elf
          -Z build-std=core,alloc
          -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # cells_args: what the "Build cells + libs" step compiles.
          # rv64/aarch64 build the whole workspace minus crates that need
          # artifacts CI can't have (see the step comment). x86_64 mirrors
          # scripts/build-x86_64-cells.ps1's curated set instead — several
          # cells (c-math-smoke, posix shims) are riscv/aarch64-only.
          - target: riscv64gc-unknown-none-elf
            short: rv64
            cc_pkg: gcc-riscv64-unknown-elf
            cc_bin: riscv64-unknown-elf-gcc
            cells_args: >-
              --workspace --exclude vicell-kernel --exclude app-mlibc-smoke
              --exclude doom --exclude tetris-c --exclude lua --exclude tetris-lua
          - target: aarch64-unknown-none-softfloat
            short: aarch64
            cc_pkg: gcc-aarch64-linux-gnu
            cc_bin: aarch64-linux-gnu-gcc
            cells_args: >-
              --workspace --exclude vicell-kernel --exclude app-mlibc-smoke
              --exclude doom --exclude tetris-c --exclude lua --exclude tetris-lua
          - target: x86_64-unknown-none
            short: x86_64
            cc_pkg: ""
            cc_bin: cc
            cells_args: >-
              -p app-init -p app-shell -p service-vfs -p service-config
              -p service-platform -p driver-nvme -p driver-e1000 -p app-sys-tools
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.short }}

      # littlefs2-sys (pulled in via redoxfs) compiles a vendored C shim for
      # whatever target `-Z build-std` is cross-compiling to; cc-rs looks for a
      # <target>-gcc by convention and finds nothing on a bare `-none` target
      # unless we install and point it at a matching cross compiler.
      - name: Install cross C compiler for littlefs2-sys
        if: matrix.cc_pkg != ''
        timeout-minutes: 10
        run: sudo apt-get update -q && sudo apt-get install -y -q ${{ matrix.cc_pkg }}

      # The rv64 artifact feeds the QEMU boot gate, and kernel_fs.img (VIFS1
      # ramdisk, gitignored build artifact) must be real — build.rs otherwise
      # embeds an empty compile-only stub that cannot boot.
      - name: Assemble bootstrap kernel_fs.img (rv64)
        if: matrix.short == 'rv64'
        run: bash scripts/build-boot-ramdisk-ci.sh

      - name: Build kernel (release)
        # Kernel codegen flags come from the workflow-level CARGO_TARGET_*
        # mirrors of .cargo/config.toml — do NOT set RUSTFLAGS here, the env
        # var would REPLACE those flags and break the link.
        run: >
          cargo build
          --release
          -p vicell-kernel
          --target ${{ matrix.target }}
          -Z build-std=core,alloc

      - name: Build cells + libs (release)
        env:
          # x86_64 CELLS use relocation-model=pic (build-x86_64-cells.ps1);
          # only the kernel is static/code-model=kernel. This step-level var
          # overrides the workflow-level kernel flags — harmless for the other
          # matrix rows, which never build the x86_64 target.
          CARGO_TARGET_X86_64_UNKNOWN_NONE_RUSTFLAGS: "-C relocation-model=pic"
          CC_riscv64gc_unknown_none_elf: ${{ matrix.short == 'rv64' && matrix.cc_bin || '' }}
          # littlefs2-sys also runs bindgen (for the LFS C struct layout), which
          # uses libclang independently of the CC_* override above and derives
          # its --target from the Rust target triple — pointing it at a bare
          # `-none` OS makes libclang hunt for a nonexistent sysroot instead of
          # the host's real glibc headers. Force it back to a real Linux target
          # (a header-only binding pass doesn't need the bare-metal ABI).
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_none_softfloat: ${{ matrix.short == 'aarch64' && '--target=aarch64-linux-gnu --sysroot=/usr/aarch64-linux-gnu' || '' }}
          BINDGEN_EXTRA_CLANG_ARGS_x86_64_unknown_none: ${{ matrix.short == 'x86_64' && '--target=x86_64-linux-gnu' || '' }}
          # littlefs2-sys's C shim must build freestanding on every target:
          # hosted compilers default to stack-protector / libc builtins
          # (__stack_chk_fail, __popcountdi2) that a bare-metal link cannot
          # resolve, and bare-elf cross gccs ship no <string.h> (vendored
          # freestanding headers fill that). Mirrors scripts/build-*-cells.ps1.
          CFLAGS_riscv64gc_unknown_none_elf: ${{ matrix.short == 'rv64' && format('-march=rv64gc -mabi=lp64d -mcmodel=medany -ffreestanding -DLFS_NO_INTRINSICS -I{0}/third_party/freestanding-include', github.workspace) || '' }}
          CC_aarch64_unknown_none_softfloat: ${{ matrix.short == 'aarch64' && matrix.cc_bin || '' }}
          CFLAGS_aarch64_unknown_none_softfloat: ${{ matrix.short == 'aarch64' && format('-ffreestanding -fno-stack-protector -mgeneral-regs-only -DLFS_NO_INTRINSICS -I{0}/third_party/freestanding-include', github.workspace) || '' }}
          CC_x86_64_unknown_none: ${{ matrix.short == 'x86_64' && matrix.cc_bin || '' }}
          CFLAGS_x86_64_unknown_none: ${{ matrix.short == 'x86_64' && format('-ffreestanding -fno-stack-protector -mno-red-zone -mno-sse -mno-mmx -DLFS_NO_INTRINSICS -I{0}/third_party/freestanding-include', github.workspace) || '' }}
        # --exclude app-mlibc-smoke: links a pre-built mlibc libc.a
        #   (scripts/setup-mlibc.ps1 / build-mlibc.sh) that CI does not have —
        #   without it the link dies on undefined puts/printf/clock_gettime.
        # --exclude doom / tetris-c: link C objects from source clones
        #   (cells/demos/*/build.rs) that CI checkouts do not populate.
        # --exclude lua / tetris-lua: on riscv64 they link picolibc/newlib
        #   libc.a from the local xpack toolchain — Ubuntu's bare-elf gcc ships
        #   no libc.a, and newlib's locale/timelocal objects are non-PIC anyway.
        run: >
          cargo build
          --release
          ${{ matrix.cells_args }}
          --target ${{ matrix.target }}
          -Z build-std=core,alloc

      - name: Upload kernel ELF
        if: matrix.short == 'rv64'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-rv64
          path: target/riscv64gc-unknown-none-elf/release/vicell-kernel
          if-no-files-found: error

      - name: Upload aarch64 kernel ELF
        if: matrix.short == 'aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-aarch64
          path: target/aarch64-unknown-none-softfloat/release/vicell-kernel
          if-no-files-found: error

      - name: Upload x86_64 kernel ELF
        if: matrix.short == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-x86_64
          path: target/x86_64-unknown-none/release/vicell-kernel
          if-no-files-found: error

  qemu-boot:
    name: QEMU Boot Test (512M RAM)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU
        timeout-minutes: 10
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-misc

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel-rv64
          path: target/riscv64gc-unknown-none-elf/release/

      - name: Make kernel executable
        run: chmod +x target/riscv64gc-unknown-none-elf/release/vicell-kernel

      - name: Run boot test
        # 256M: kernel is now 4.4 MB (kernel_fs.img embedded separately).
        # Checks for FAT32 mount (always present) or full shell prompt.
        run: bash scripts/qemu-boot-test.sh target/riscv64gc-unknown-none-elf/release/vicell-kernel

  aarch64-lint:
    name: Clippy (aarch64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src,clippy
          targets: aarch64-unknown-none-softfloat

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: aarch64-lint

      - name: Clippy (aarch64)
        run: >
          cargo clippy
          -p vicell-kernel
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc
          -- -D warnings

  qemu-aarch64-boot:
    name: QEMU Boot Test (aarch64)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src
          targets: aarch64-unknown-none-softfloat

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: aarch64-boot

      - name: Install QEMU, libclang and aarch64 sysroot
        timeout-minutes: 10
        # gcc-aarch64-linux-gnu supplies /usr/aarch64-linux-gnu — the sysroot
        # bindgen needs for aarch64 struct layouts (host glibc headers 404 on
        # bits/libc-header-start.h under --target=aarch64-linux-gnu).
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-arm libclang-dev gcc-aarch64-linux-gnu

      - name: Build aarch64 cells
        # clang cross-compiles the littlefs C core for the bare-metal target
        # (mirrors scripts/build-aarch64-cells.ps1); the vendored freestanding
        # headers provide <string.h>.
        env:
          CC_aarch64_unknown_none_softfloat: clang
          CFLAGS_aarch64_unknown_none_softfloat: --target=aarch64-unknown-none-elf -ffreestanding -mgeneral-regs-only -DLFS_NO_INTRINSICS -I${{ github.workspace }}/third_party/freestanding-include
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_none_softfloat: --target=aarch64-linux-gnu --sysroot=/usr/aarch64-linux-gnu
        run: >
          cargo build --release
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc
          -p app-init -p app-shell -p service-vfs -p service-config
          -p service-net -p service-input -p service-compositor

      # kernel_fs.img is a gitignored build artifact; assemble it from the
      # cells built above so the kernel embeds a real VIFS1 (build.rs would
      # otherwise stub it and the boot test could never reach the shell).
      - name: Assemble aarch64 kernel_fs.img
        run: |
          REL=target/aarch64-unknown-none-softfloat/release
          python3 tools/mkfat32.py \
            kernel/src/embedded-aarch64/kernel_fs.img \
            "$REL/app-shell"      /bin/shell \
            "$REL/service-vfs"    /bin/vfs \
            "$REL/service-config" /bin/config \
            "$REL/service-input"  /bin/input
          cp "$REL/app-init" kernel/src/embedded-aarch64/init

      - name: Build aarch64 kernel
        run: >
          cargo build --release
          -p vicell-kernel
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc

      - name: Create aarch64 disk image
        run: bash scripts/format-disk-arm.sh disk_arm_virt.img

      - name: Boot test (aarch64)
        run: |
          chmod +x scripts/qemu-aarch64-test.sh
          BOOT_WINDOW=90 bash scripts/qemu-aarch64-test.sh

  qemu-hypervisor-smoke:
    name: QEMU Hypervisor Smoke (Alpine / # in 180s)
    runs-on: ubuntu-24.04
    # continue-on-error: alpine fetch or TCG timeout should not block other CI jobs.
    continue-on-error: true
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src
          targets: aarch64-unknown-none-softfloat

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: hypervisor-smoke

      - name: Install QEMU and aarch64 sysroot
        timeout-minutes: 10
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-arm libclang-dev gcc-aarch64-linux-gnu

      - name: Cache Alpine artifacts
        uses: actions/cache@v4
        with:
          path: .alpine-cache
          key: alpine-netboot-aarch64-3.21.3

      - name: Fetch Alpine aarch64 netboot artifacts
        run: |
          chmod +x scripts/fetch-alpine-artifacts.sh
          bash scripts/fetch-alpine-artifacts.sh .alpine-cache

      - name: Build aarch64 cells (core + hypervisor)
        env:
          CC_aarch64_unknown_none_softfloat: clang
          CFLAGS_aarch64_unknown_none_softfloat: --target=aarch64-unknown-none-elf -ffreestanding -mgeneral-regs-only -DLFS_NO_INTRINSICS -I${{ github.workspace }}/third_party/freestanding-include
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_unknown_none_softfloat: --target=aarch64-linux-gnu --sysroot=/usr/aarch64-linux-gnu
        run: >
          cargo build --release
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc
          -p app-init -p app-shell -p service-vfs -p service-config
          -p service-net -p service-hypervisor

      - name: Build hypervisor kernel_fs.img (embeds Alpine)
        run: |
          chmod +x scripts/make-hypervisor-fs.sh
          bash scripts/make-hypervisor-fs.sh --skip-fetch

      - name: Build aarch64 hypervisor kernel (EMBEDDED_OVERRIDE)
        # RUSTFLAGS REPLACES the config.toml per-target flags, so it must
        # repeat +bti,+paca,+pacg alongside the kernel's relocation model.
        env:
          RUSTFLAGS: "-C relocation-model=pic -C target-feature=+bti,+paca,+pacg"
          EMBEDDED_OVERRIDE: "kernel/src/embedded-hv"
        run: >
          cargo build --release
          -p vicell-kernel
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc

      - name: Create hypervisor disk image
        run: |
          chmod +x scripts/format-disk-hv-arm.sh
          bash scripts/format-disk-hv-arm.sh disk_hv_arm.img

      - name: Run hypervisor smoke test (Alpine / # within 180s)
        run: |
          chmod +x scripts/qemu-hypervisor-smoke.sh
          BOOT_WINDOW=180 bash scripts/qemu-hypervisor-smoke.sh

  x86_64-lint:
    name: Clippy (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src,clippy
          targets: x86_64-unknown-none

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: x86_64-lint

      - name: Clippy (x86_64)
        run: >
          cargo clippy
          -p vicell-kernel
          --target x86_64-unknown-none
          -Z build-std=core,alloc
          -- -D warnings

  qemu-x86_64-boot:
    name: QEMU Boot Test (x86_64)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src
          targets: x86_64-unknown-none

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: x86_64-boot

      - name: Install QEMU and xorriso
        timeout-minutes: 10
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-x86 xorriso

      - name: Build x86_64 cells
        # Cells use relocation-model=pic (mirrors build-x86_64-cells.ps1);
        # freestanding CFLAGS keep host-cc builtins out of the bare-metal link.
        env:
          CARGO_TARGET_X86_64_UNKNOWN_NONE_RUSTFLAGS: "-C relocation-model=pic"
          CC_x86_64_unknown_none: cc
          CFLAGS_x86_64_unknown_none: -ffreestanding -fno-stack-protector -mno-red-zone -mno-sse -mno-mmx -DLFS_NO_INTRINSICS -I${{ github.workspace }}/third_party/freestanding-include
          BINDGEN_EXTRA_CLANG_ARGS_x86_64_unknown_none: --target=x86_64-linux-gnu
        run: >
          cargo build --release
          --target x86_64-unknown-none
          -Z build-std=core,alloc
          -p app-init -p app-shell -p service-vfs -p service-config
          -p service-platform -p driver-nvme -p driver-e1000 -p app-sys-tools

      # kernel_fs.img is a gitignored build artifact; the committed copy goes
      # stale against the kernel ABI — assemble a fresh one (mirrors
      # scripts/build-x86_64-cells.ps1's image layout).
      - name: Assemble x86_64 kernel_fs.img
        run: |
          REL=target/x86_64-unknown-none/release
          python3 tools/mkfat32.py \
            kernel/src/embedded-x86_64/kernel_fs.img \
            "$REL/app-shell"      /bin/shell \
            "$REL/service-vfs"    /bin/vfs \
            "$REL/service-config" /bin/config \
            "$REL/platform"       /bin/platform \
            "$REL/driver-nvme"    /bin/nvme \
            "$REL/driver-e1000"   /bin/e1000 \
            "$REL/ls"             /bin/ls \
            "$REL/cat"            /bin/cat \
            "$REL/echo"           /bin/echo \
            "$REL/ps"             /bin/ps
          cp "$REL/app-init" kernel/src/embedded-x86_64/init

      - name: Build x86_64 kernel
        run: >
          cargo build --release
          -p vicell-kernel
          --target x86_64-unknown-none
          -Z build-std=core,alloc

      - name: Build Limine ISO
        run: bash scripts/x86/make-iso-ci.sh build/vicell-x86.iso

      - name: Boot test (x86_64)
        run: |
          chmod +x scripts/qemu-x86_64-test.sh
          BOOT_WINDOW=90 bash scripts/qemu-x86_64-test.sh build/vicell-x86.iso

  vfs-quota:
    name: VFS Quota Integration Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: vfs-quota

      - name: Install dependencies
        timeout-minutes: 10
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-misc gcc-riscv64-unknown-elf libclang-dev

      - name: Build test-hooks kernel
        run: |
          chmod +x scripts/build-test-hooks-ci.sh
          bash scripts/build-test-hooks-ci.sh

      - name: Run VFS quota integration test
        # tests/integration/.cargo/config.toml pins the host target to
        # x86_64-pc-windows-msvc (local dev); the env var overrides it here.
        env:
          CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
        run: cd tests/integration && cargo test --test vfs-quota

  redoxfs-srv:
    name: RedoxFS /srv Integration Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: redoxfs-srv

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            qemu-system-misc gcc-riscv64-unknown-elf libclang-dev

      - name: Build test-hooks kernel (needed by degrade test)
        run: |
          chmod +x scripts/build-test-hooks-ci.sh
          bash scripts/build-test-hooks-ci.sh

      - name: Build srv-test kernel
        run: |
          chmod +x scripts/build-srv-test-ci.sh
          bash scripts/build-srv-test-ci.sh

      - name: Build disk_srv.img
        run: |
          chmod +x scripts/mksrv-img.sh
          bash scripts/mksrv-img.sh build/disk_srv.img

      - name: Run RedoxFS /srv integration tests
        env:
          CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
        run: cd tests/integration && cargo test --test redoxfs-srv

  unit-tests:
    name: Host unit tests (types + api)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run host-side unit tests
        # libs/types and libs/api use cfg_attr(not(test), no_std) so they can
        # run on the host without a bare-metal target.
        run: |
          cargo test -p types --target x86_64-unknown-linux-gnu
          cargo test -p api   --target x86_64-unknown-linux-gnu

  unsafe-ratchet:
    # Replaces the cargo-geiger gate: geiger cannot analyse `-Z build-std`
    # bare-metal targets (instant CLI failure), and its premise — zero unsafe
    # in cells/ — is false: Driver Cells legitimately need unsafe for MMIO/DMA.
    # The ratchet enforces the real invariant: no unsafe OUTSIDE the audited
    # allowlist in scripts/check-cells-unsafe-ratchet.py.
    name: Unsafe ratchet (cells/ allowlist must not grow)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check unsafe stays inside the audited allowlist
        run: python3 scripts/check-cells-unsafe-ratchet.py

  shell-utils:
    name: Shell Utilities Integration Test (Phase E)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: shell-utils

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            qemu-system-misc gcc-riscv64-unknown-elf libclang-dev

      - name: Build shell-test kernel
        run: |
          chmod +x scripts/build-shell-test-ci.sh
          bash scripts/build-shell-test-ci.sh

      - name: Run shell utility integration tests
        env:
          CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
        run: cd tests/integration && cargo test --test shell-utils

  # Network data-path integration tests (DHCP → TCP → HTTP → listen/accept)
  # against the virtio-net Driver Cell. Previously the WHOLE boot suite was
  # NOT in CI, which let it rot undetected (see below). This job gates the
  # verified-green network subset so the Driver-Cell path can never silently
  # regress again. prerequisites use ci_guard(): a missing kernel/disk FAILS
  # this job instead of silently skipping every test.
  #
  # ⚠ Scoped to an ALLOWLIST, not an unfiltered `boot` suite run — so any
  # FUTURE new test starts excluded until proven 2/2, same discipline as
  # always. UPDATE (2026-07-13, .agents/260712-0901-suite-green-3arch/
  # reports/truth-matrix.md): the "~20 tests fail on drifted assertions" note
  # this used to carry is STALE — two independent fresh-image full-suite runs
  # (54 tests, --test-threads=2) both passed 53-54/54, with exactly one test
  # timing out per run (always one of network_tcp_send_recv /
  # network_curl_http_get) under TCG contention from running the whole suite
  # at once; each passed 100% in isolation and across both full runs overall.
  # The allowlist below was expanded to the full current test list on that
  # evidence. Verified only on local QEMU 10.2.0/Windows, not yet on this
  # job's ubuntu-24.04 QEMU build — first CI run after this change is the
  # verification; if a test proves flaky here that wasn't locally, remove it
  # and note why, don't silently retry until green.
  boot-suite:
    name: Network Data-Path Integration (riscv64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: boot-suite

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            qemu-system-misc gcc-riscv64-unknown-elf libclang-dev

      - name: Build cells + kernel + disk images (gen_disk)
        env:
          # gen_disk's cargo builds pass no --target: locally the gitignored
          # .cargo/config.toml supplies the riscv64 default; without this the
          # cells silently build for the HOST and fail to link.
          CARGO_BUILD_TARGET: riscv64gc-unknown-none-elf
          CC_riscv64gc_unknown_none_elf: riscv64-unknown-elf-gcc
          # Ubuntu's bare-elf cross gcc ships no libc headers; littlefs (via
          # service-vfs) includes <string.h> — vendored freestanding set.
          CFLAGS_riscv64gc_unknown_none_elf: -march=rv64gc -mabi=lp64d -mcmodel=medany -ffreestanding -DLFS_NO_INTRINSICS -I${{ github.workspace }}/third_party/freestanding-include
          OBJCOPY: riscv64-unknown-elf-objcopy
        run: pwsh ./gen_disk.ps1

      - name: Run boot + network + shell + VFS tests
        env:
          CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
        # Allowlist by exact test-fn name (OR semantics). --test-threads=2: each
        # test boots its own QEMU and TCG is CPU-bound. 2026-07-13: expanded from
        # a 22-test subset to the full current 54-test list — two independent
        # fresh-image full-suite runs both passed 53-54/54 (see the job comment
        # above). Includes the P02 input-delivery fixes (input_keyboard_e2e,
        # input_bare_cell) and the P03 char-8-stall regression guard
        # (console_long_line_with_backspace_no_stall). Any NEW test added to
        # boot.rs after this point starts excluded until it passes 2/2
        # consecutive full runs, per the existing discipline.
        #
        # Removed 2026-07-14 after the first real CI execution (50/54 passed,
        # all four pass locally on QEMU 10.2 / Windows — ubuntu-24.04 ships
        # QEMU 8.2, so these are CI-environment gaps, tracked for follow-up):
        #   input_keyboard_e2e        — QEMU produced no serial at all in 40s
        #                               (QMP VirtIO-keyboard path differs on 8.2)
        #   posix_shim_getentropy / posix_shim_net — no output within 10s
        #                               (VirtIO-RNG / shim spawn path on 8.2)
        # (network_httpd_serves_file was also pulled in that pass but restored
        # once --test-threads=1 removed the TCG-contention flake class.)
        # --test-threads=1: each test boots its own TCG QEMU (CPU-bound); at
        # threads=2 on the 4-vCPU runner exactly one network test times out
        # per run from contention (listen_accept / serves_file / send_recv
        # rotated across runs). Serial execution trades ~3 min of wall time
        # for determinism.
        run: |
          cd tests/integration
          cargo test --test boot -- --test-threads=1 \
            boots_to_shell_prompt fat_filesystem_mounts shell_executes_echo \
            hot_migration_state_transfer_works gpu_framebuffer_initialises \
            network_dhcp_acquires_ip network_tcp_send_recv network_curl_http_get \
            network_tcp_listen_accept \
            vfs_write_echo_redirect vfs_fat16_write_read vfs_fat16_reboot_persistence \
            vfs_write_large_content vfs_fat16_unlink vfs_fat16_subdir \
            block_io_denied_non_vfs vfs_fat16_subdir_persistence vfs_fat16_recursive_rmdir \
            vfs_fat16_append \
            network_httpd_serves_file network_httpd_dynamic_content \
            shell_while_loop shell_function_positional_args shell_case_statement \
            shell_echo_e shell_redirect_append network_wget_downloads_to_vfs \
            mqtt_publish mqtt_subscribe shell_test_builtin shell_function_define_and_call \
            shell_midtoken_var_expansion shell_unset_var shell_exit_code_var \
            shell_break_loop shell_and_operator shell_or_operator shell_for_loop \
            shell_if_true_branch shell_if_else_branch shell_variable_assignment \
            shell_variable_persists shell_source_script shell_sleep_returns \
            shell_source_multi_command shell_cmd_substitution \
            console_long_line_with_backspace_no_stall \
            input_service_registered_at_boot compositor_input_routing_active \
            bench_all_pass input_bare_cell

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny
        # v1's bundled cargo-deny can't parse CVSS 4.0 entries now present in
        # the RustSec advisory DB ("unsupported CVSS version: 4.0"); v2 ships
        # a current cargo-deny that supports it.
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --all-features

      - name: cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
