name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Fast static guard (no build): every Cell's linker base must be off the kernel
      # MMIO identity maps, below RAM, and unique. In the SAS all cells share one page
      # table, so a colliding base silently clobbers MMIO/neighbour PTEs. Runs first so
      # a layout regression fails in seconds, before the expensive clippy/build.
      - name: Check Cell VA layout (SAS)
        run: python3 scripts/check-cell-va-layout.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src,rustfmt,clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (riscv64 target)
        run: >
          cargo clippy
          --workspace
          --target riscv64gc-unknown-none-elf
          -Z build-std=core,alloc
          -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: riscv64gc-unknown-none-elf
            short: rv64
          - target: aarch64-unknown-none-softfloat
            short: aarch64
          - target: x86_64-unknown-none
            short: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.short }}

      - name: Build (release)
        # The rv64 kernel links as -pie (build.rs, for Limine KASLR); rustc must
        # emit position-independent code or the linker rejects absolute R_RISCV_64
        # relocations. Scope pic to rv64 only — aarch64/x86 kernels are not -pie,
        # and a workspace-wide pic would also miscompile Cells (GOT-indirect .data).
        env:
          RUSTFLAGS: ${{ matrix.short == 'rv64' && '-D warnings -C relocation-model=pic' || '-D warnings' }}
        run: >
          cargo build
          --release
          --target ${{ matrix.target }}
          -Z build-std=core,alloc

      - name: Upload kernel ELF
        if: matrix.short == 'rv64'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-rv64
          path: target/riscv64gc-unknown-none-elf/release/vicell-kernel
          if-no-files-found: error

      - name: Upload aarch64 kernel ELF
        if: matrix.short == 'aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-aarch64
          path: target/aarch64-unknown-none-softfloat/release/vicell-kernel
          if-no-files-found: error

      - name: Upload x86_64 kernel ELF
        if: matrix.short == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-x86_64
          path: target/x86_64-unknown-none/release/vicell-kernel
          if-no-files-found: error

  qemu-boot:
    name: QEMU Boot Test (512M RAM)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-misc

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel-rv64
          path: target/riscv64gc-unknown-none-elf/release/

      - name: Make kernel executable
        run: chmod +x target/riscv64gc-unknown-none-elf/release/vicell-kernel

      - name: Run boot test
        # 256M: kernel is now 4.4 MB (kernel_fs.img embedded separately).
        # Checks for FAT32 mount (always present) or full shell prompt.
        run: bash scripts/qemu-boot-test.sh target/riscv64gc-unknown-none-elf/release/vicell-kernel

  aarch64-lint:
    name: Clippy (aarch64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src,clippy
          targets: aarch64-unknown-none-softfloat

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: aarch64-lint

      - name: Clippy (aarch64)
        run: >
          cargo clippy
          -p vicell-kernel
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc
          -- -D warnings

  qemu-aarch64-boot:
    name: QEMU Boot Test (aarch64)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src
          targets: aarch64-unknown-none-softfloat

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: aarch64-boot

      - name: Install QEMU and libclang
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-arm libclang-dev

      - name: Build aarch64 kernel
        run: >
          cargo build --release
          -p vicell-kernel
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc

      - name: Build aarch64 cells
        run: >
          cargo build --release
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc
          -p app-init -p app-shell -p service-vfs -p service-config
          -p service-net -p service-input -p service-compositor

      - name: Create aarch64 disk image
        run: bash scripts/format-disk-arm.sh disk_arm_virt.img

      - name: Boot test (aarch64)
        run: |
          chmod +x scripts/qemu-aarch64-test.sh
          BOOT_WINDOW=90 bash scripts/qemu-aarch64-test.sh

  qemu-hypervisor-smoke:
    name: QEMU Hypervisor Smoke (Alpine / # in 180s)
    runs-on: ubuntu-24.04
    # continue-on-error: alpine fetch or TCG timeout should not block other CI jobs.
    continue-on-error: true
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src
          targets: aarch64-unknown-none-softfloat

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: hypervisor-smoke

      - name: Install QEMU
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-arm

      - name: Cache Alpine artifacts
        uses: actions/cache@v4
        with:
          path: .alpine-cache
          key: alpine-netboot-aarch64-3.21.3

      - name: Fetch Alpine aarch64 netboot artifacts
        run: |
          chmod +x scripts/fetch-alpine-artifacts.sh
          bash scripts/fetch-alpine-artifacts.sh .alpine-cache

      - name: Build aarch64 cells (core + hypervisor)
        run: >
          cargo build --release
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc
          -p app-init -p app-shell -p service-vfs -p service-config
          -p service-net -p service-hypervisor

      - name: Build hypervisor kernel_fs.img (embeds Alpine)
        run: |
          chmod +x scripts/make-hypervisor-fs.sh
          bash scripts/make-hypervisor-fs.sh --skip-fetch

      - name: Build aarch64 hypervisor kernel (EMBEDDED_OVERRIDE)
        env:
          RUSTFLAGS: "-D warnings -C relocation-model=pic"
          EMBEDDED_OVERRIDE: "kernel/src/embedded-hv"
        run: >
          cargo build --release
          -p vicell-kernel
          --target aarch64-unknown-none-softfloat
          -Z build-std=core,alloc

      - name: Create hypervisor disk image
        run: |
          chmod +x scripts/format-disk-hv-arm.sh
          bash scripts/format-disk-hv-arm.sh disk_hv_arm.img

      - name: Run hypervisor smoke test (Alpine / # within 180s)
        run: |
          chmod +x scripts/qemu-hypervisor-smoke.sh
          BOOT_WINDOW=180 bash scripts/qemu-hypervisor-smoke.sh

  x86_64-lint:
    name: Clippy (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src,clippy
          targets: x86_64-unknown-none

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: x86_64-lint

      - name: Clippy (x86_64)
        run: >
          cargo clippy
          -p vicell-kernel
          --target x86_64-unknown-none
          -Z build-std=core,alloc
          -- -D warnings

  qemu-x86_64-boot:
    name: QEMU Boot Test (x86_64)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src
          targets: x86_64-unknown-none

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: x86_64-boot

      - name: Install QEMU and xorriso
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-x86 xorriso

      - name: Build x86_64 kernel
        run: >
          cargo build --release
          -p vicell-kernel
          --target x86_64-unknown-none
          -Z build-std=core,alloc

      - name: Build Limine ISO
        run: bash scripts/x86/make-iso-ci.sh build/vicell-x86.iso

      - name: Boot test (x86_64)
        run: |
          chmod +x scripts/qemu-x86_64-test.sh
          BOOT_WINDOW=90 bash scripts/qemu-x86_64-test.sh build/vicell-x86.iso

  vfs-quota:
    name: VFS Quota Integration Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: vfs-quota

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y -q qemu-system-misc gcc-riscv64-unknown-elf libclang-dev

      - name: Build test-hooks kernel
        run: |
          chmod +x scripts/build-test-hooks-ci.sh
          bash scripts/build-test-hooks-ci.sh

      - name: Run VFS quota integration test
        run: cd tests/integration && cargo test --test vfs-quota

  redoxfs-srv:
    name: RedoxFS /srv Integration Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: redoxfs-srv

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            qemu-system-misc gcc-riscv64-unknown-elf libclang-dev

      - name: Build test-hooks kernel (needed by degrade test)
        run: |
          chmod +x scripts/build-test-hooks-ci.sh
          bash scripts/build-test-hooks-ci.sh

      - name: Build srv-test kernel
        run: |
          chmod +x scripts/build-srv-test-ci.sh
          bash scripts/build-srv-test-ci.sh

      - name: Build disk_srv.img
        run: |
          chmod +x scripts/mksrv-img.sh
          bash scripts/mksrv-img.sh build/disk_srv.img

      - name: Run RedoxFS /srv integration tests
        run: cd tests/integration && cargo test --test redoxfs-srv

  unit-tests:
    name: Host unit tests (types + api)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run host-side unit tests
        # libs/types and libs/api use cfg_attr(not(test), no_std) so they can
        # run on the host without a bare-metal target.
        run: |
          cargo test -p types --target x86_64-unknown-linux-gnu
          cargo test -p api   --target x86_64-unknown-linux-gnu

  geiger-gate:
    name: Unsafe regression (cells/ must have 0 unsafe)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-geiger
        run: cargo install --locked cargo-geiger

      - name: Assert zero unsafe in cells/
        run: |
          cargo geiger --workspace --output-format json \
            --target riscv64gc-unknown-none-elf \
            -Z build-std=core,alloc \
            > geiger.json 2>&1 || true
          python3 - << 'PYEOF'
          import json, sys
          with open("geiger.json") as f:
              data = json.load(f)
          violations = [
              pkg["package"]["manifest_path"]
              for pkg in data.get("packages", [])
              if "cells/" in pkg.get("package", {}).get("manifest_path", "")
              and pkg.get("unsafety", {}).get("used", {}).get("unsafe_used", 0) > 0
          ]
          if violations:
              print("FAIL: unsafe code found in cells/:")
              for v in violations: print(f"  {v}")
              sys.exit(1)
          print("PASS: cells/ contains zero unsafe blocks")
          PYEOF

  shell-utils:
    name: Shell Utilities Integration Test (Phase E)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: shell-utils

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            qemu-system-misc gcc-riscv64-unknown-elf libclang-dev

      - name: Build shell-test kernel
        run: |
          chmod +x scripts/build-shell-test-ci.sh
          bash scripts/build-shell-test-ci.sh

      - name: Run shell utility integration tests
        run: cd tests/integration && cargo test --test shell-utils

  # Network data-path integration tests (DHCP → TCP → HTTP → listen/accept)
  # against the virtio-net Driver Cell. Previously the WHOLE boot suite was
  # NOT in CI, which let it rot undetected (see below). This job gates the
  # verified-green network subset so the Driver-Cell path can never silently
  # regress again. prerequisites use ci_guard(): a missing kernel/disk FAILS
  # this job instead of silently skipping every test.
  #
  # ⚠ Scoped to an ALLOWLIST, not an unfiltered `boot` suite run — so any
  # FUTURE new test starts excluded until proven 2/2, same discipline as
  # always. UPDATE (2026-07-13, .agents/260712-0901-suite-green-3arch/
  # reports/truth-matrix.md): the "~20 tests fail on drifted assertions" note
  # this used to carry is STALE — two independent fresh-image full-suite runs
  # (54 tests, --test-threads=2) both passed 53-54/54, with exactly one test
  # timing out per run (always one of network_tcp_send_recv /
  # network_curl_http_get) under TCG contention from running the whole suite
  # at once; each passed 100% in isolation and across both full runs overall.
  # The allowlist below was expanded to the full current test list on that
  # evidence. Verified only on local QEMU 10.2.0/Windows, not yet on this
  # job's ubuntu-24.04 QEMU build — first CI run after this change is the
  # verification; if a test proves flaky here that wasn't locally, remove it
  # and note why, don't silently retry until green.
  boot-suite:
    name: Network Data-Path Integration (riscv64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-01
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: boot-suite

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            qemu-system-misc gcc-riscv64-unknown-elf libclang-dev

      - name: Build cells + kernel + disk images (gen_disk)
        env:
          CC_riscv64gc_unknown_none_elf: riscv64-unknown-elf-gcc
          OBJCOPY: riscv64-unknown-elf-objcopy
        run: pwsh ./gen_disk.ps1

      - name: Run boot + network + shell + VFS tests
        # Allowlist by exact test-fn name (OR semantics). --test-threads=2: each
        # test boots its own QEMU and TCG is CPU-bound. 2026-07-13: expanded from
        # a 22-test subset to the full current 54-test list — two independent
        # fresh-image full-suite runs both passed 53-54/54 (see the job comment
        # above). Includes the P02 input-delivery fixes (input_keyboard_e2e,
        # input_bare_cell) and the P03 char-8-stall regression guard
        # (console_long_line_with_backspace_no_stall). Any NEW test added to
        # boot.rs after this point starts excluded until it passes 2/2
        # consecutive full runs, per the existing discipline.
        run: |
          cd tests/integration
          cargo test --test boot -- --test-threads=2 \
            boots_to_shell_prompt fat_filesystem_mounts shell_executes_echo \
            hot_migration_state_transfer_works gpu_framebuffer_initialises \
            network_dhcp_acquires_ip network_tcp_send_recv network_curl_http_get \
            network_tcp_listen_accept \
            vfs_write_echo_redirect vfs_fat16_write_read vfs_fat16_reboot_persistence \
            vfs_write_large_content vfs_fat16_unlink vfs_fat16_subdir \
            block_io_denied_non_vfs vfs_fat16_subdir_persistence vfs_fat16_recursive_rmdir \
            vfs_fat16_append \
            network_httpd_serves_file network_httpd_dynamic_content \
            shell_while_loop shell_function_positional_args shell_case_statement \
            shell_echo_e shell_redirect_append network_wget_downloads_to_vfs \
            mqtt_publish mqtt_subscribe shell_test_builtin shell_function_define_and_call \
            shell_midtoken_var_expansion shell_unset_var shell_exit_code_var \
            shell_break_loop shell_and_operator shell_or_operator shell_for_loop \
            shell_if_true_branch shell_if_else_branch shell_variable_assignment \
            shell_variable_persists shell_source_script shell_sleep_returns \
            shell_source_multi_command shell_cmd_substitution \
            console_long_line_with_backspace_no_stall \
            input_service_registered_at_boot compositor_input_routing_active \
            bench_all_pass input_keyboard_e2e input_bare_cell \
            posix_shim_getentropy posix_shim_net

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          arguments: --all-features

      - name: cargo-audit
        uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
