[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
# Linker script is provided by build.rs.
# build.rs links the kernel as a PIE (-pie) for Limine KASLR; rustc must emit
# position-independent code (PC-relative / R_RISCV_RELATIVE) to match, else the
# linker rejects absolute R_RISCV_64 relocations ("cannot be used against .L0").
rustflags = ["-C", "relocation-model=pic"]
