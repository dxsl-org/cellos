[package]
name = "tetris-c"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Tetris-C port via Banaxi-Tech/Tetris-OS — runs on ViCell compositor with keyboard input"

[[bin]]
name = "tetris-c"
path = "src/main.rs"

[dependencies]
api  = { path = "../../../libs/api", version = "0.1.0" }
ostd = { path = "../../../libs/ostd", version = "0.2.0" }

[build-dependencies]
cc         = "1.0"
cell-build = { path = "../../../libs/cell-build", version = "0.2.0" }
