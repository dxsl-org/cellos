[package]
name = "tetris-lua"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Tetris-Lua — game logic in Lua 5.4, platform hooks (surface/input/time) in Rust"

[[bin]]
name = "tetris-lua"
path = "src/main.rs"

[dependencies]
api  = { path = "../../../libs/api", version = "0.1.0" }
ostd = { path = "../../../libs/ostd", version = "0.2.0" }

[build-dependencies]
cc         = "1.0"
cell-build = { path = "../../../libs/cell-build", version = "0.2.0" }
