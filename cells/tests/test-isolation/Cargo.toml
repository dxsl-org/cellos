[package]
name = "test-isolation"
version = "0.1.0"
edition = "2021"
license.workspace = true

[dependencies]
# Apps should ONLY depend on ostd/api, NOT kernel
ostd = { path = "../../../libs/ostd", version = "0.2.0" }
api = { path = "../../../libs/api", version = "0.1.0" }

# This should cause compile error if uncommented:
# kernel = { path = "../../kernel" }

[lib]
crate-type = ["staticlib"]

[build-dependencies]
cell-build = { path = "../../../libs/cell-build", version = "0.2.0" }
