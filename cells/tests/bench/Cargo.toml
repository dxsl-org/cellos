[package]
name = "app-bench"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "ViCell performance benchmark cell — measures context-switch, IPC, syscall, and memory targets"

[dependencies]
ostd = { path = "../../../libs/ostd", version = "0.2.0" }
api  = { path = "../../../libs/api", version = "0.1.0" }

[[bin]]
name = "bench"
path = "src/main.rs"

[[bin]]
name = "bench-probe"
path = "src/bench-probe.rs"

[build-dependencies]
cell-build = { path = "../../../libs/cell-build", version = "0.2.0" }
