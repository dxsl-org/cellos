[package]
name = "app-init"
version = "0.1.0"
edition = "2021"
license.workspace = true

[dependencies]
types = { path = "../../../libs/types", version = "0.1.0" }
api = { path = "../../../libs/api", version = "0.1.0" }
ostd = { path = "../../../libs/ostd", version = "0.2.0" }

[features]
default = []
# When enabled, init spawns /bin/vfs-test after the main service stack is up.
# Only used in CI test-hooks kernel builds — never in production.
test-hooks = []

[build-dependencies]
cell-build = { path = "../../../libs/cell-build", version = "0.2.0" }

