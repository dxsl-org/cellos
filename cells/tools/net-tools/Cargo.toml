[package]
name = "app-net-tools"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "ViCell network utilities: ping, curl, nc, wget"

[dependencies]
ostd = { path = "../../../libs/ostd", version = "0.2.0" }
api  = { path = "../../../libs/api", version = "0.1.0" }

[[bin]]
name = "ping"
path = "src/bin/ping.rs"

[[bin]]
name = "curl"
path = "src/bin/curl.rs"

[[bin]]
name = "nc"
path = "src/bin/nc.rs"

[[bin]]
name = "wget"
path = "src/bin/wget.rs"

[[bin]]
name = "httpd"
path = "src/bin/httpd.rs"

[[bin]]
name = "mqtt"
path = "src/bin/mqtt.rs"

[build-dependencies]
cell-build = { path = "../../../libs/cell-build", version = "0.2.0" }
