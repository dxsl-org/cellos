[package]
name = "service-vfs"
version = "0.1.0"
edition = "2021"
license.workspace = true

[dependencies]
types = { path = "../../../libs/types" }
api = { path = "../../../libs/api" }
ostd = { path = "../../../libs/ostd" }
driver-disk = { path = "../../drivers/disk" }
# `lfn` is REQUIRED: mkfat32.py stores cell names with a long-filename entry
# (lowercase basenames like `nc` cannot be represented by an uppercase-only 8.3
# short name, so the real name lives in the LFN). Without `lfn`, fatfs sees only
# the mangled 8.3 form (`NC~1`) and a lookup of `/bin/nc` from the disk cell-store
# fails — which silently made the cell-store unreadable for interactive spawns.
fatfs = { git = "https://github.com/rafalh/rust-fatfs", default-features = false, features = ["alloc", "lfn"] }
littlefs2 = { version = "0.7.2", default-features = false, optional = true }
redoxfs = { path = "../../../third_party/redoxfs", default-features = false }
redox_syscall = { version = "0.7.5", default-features = false }

[features]
# `littlefs` gates the /data power-loss-resilient backend (littlefs2-sys), whose
# C core needs a bare-metal cross-C toolchain (newlib headers). Only riscv has one
# provisioned (xpack riscv-none-elf-gcc, wired in gen_disk.ps1), so it is a DEFAULT
# feature to keep the riscv build unchanged; the x86_64/aarch64 cell builds pass
# --no-default-features (no C toolchain → no /data volume, not needed for boot).
default = ["littlefs"]
littlefs = ["dep:littlefs2"]
# Shrinks the per-cell quota to a tiny limit so the vfs-test cell can exercise
# quota enforcement (Err 2) without writing the full 32 MB production limit.
# Enabled ONLY for the integration-test kernel build — never in production.
test-hooks = []

[[bin]]
name = "service-vfs"
path = "src/main.rs"

[build-dependencies]
cell-build = { path = "../../../libs/cell-build" }
