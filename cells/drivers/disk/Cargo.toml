[package]
name = "driver-disk"
version = "0.1.0"
edition = "2021"
license.workspace = true

[dependencies]
types = { path = "../../../libs/types", version = "0.1.0" }
api = { path = "../../../libs/api", version = "0.1.0" }
ostd = { path = "../../../libs/ostd", version = "0.2.0" }

[lib]
# Dual output: rlib for Rust deps, staticlib for final Cell linking
crate-type = ["rlib", "staticlib"]

[build-dependencies]
cell-build = { path = "../../../libs/cell-build", version = "0.2.0" }
