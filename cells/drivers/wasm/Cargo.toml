[package]
name = "driver-wasm"
version = "0.2.0"
edition = "2021"
license.workspace = true

[lib]
# No staticlib — this is a Rust library linked by the WASM host cell binary.

[dependencies]
types    = { path = "../../../libs/types", version = "0.1.0" }
api      = { path = "../../../libs/api", version = "0.1.0" }
ostd     = { path = "../../../libs/ostd", version = "0.2.0" }
wasmi    = { version = "1", default-features = false, features = ["prefer-btree-collections"] }

[build-dependencies]
cell-build = { path = "../../../libs/cell-build", version = "0.2.0" }
