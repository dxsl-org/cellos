[package]
name = "hal-arm"
version = "0.1.0"
edition = "2021"
license = "MPL-2.0"

[dependencies]
hal-arch-trait  = { path = "../../traits/arch", version = "0.1.0" }
hal-mte         = { path = "../../traits/mte", version = "0.1.0" }
hal-paging      = { path = "../../traits/paging", version = "0.1.0" }
hal-hypervisor  = { path = "../../traits/hypervisor", version = "0.1.0" }
types = { path = "../../../libs/types", version = "0.1.0" }
critical-section = { version = "1", optional = true, features = ["restore-state-usize"] }

[target.'cfg(target_arch = "aarch64")'.dependencies]
aarch64-cpu = "11"

[features]
default = []
critical-section-impl = ["dep:critical-section"]
# Enable BTI landing-pad enforcement in SCTLR_EL1 (requires -C target-feature=+bti).
cfi-bti = []
# Enable MTE2 tag-check faults in SCTLR_EL1 (requires ARMv8.5 hardware or TCG MTE model).
mte = []
# Raspberry Pi 3 (BCM2837) board target: selects BCM mini UART, BCM2836 local IRQ
# controller, and auto-detected timer frequency instead of GIC + QEMU virt defaults.
board-rpi3 = []
