[package]
name = "hal-riscv"
version = "0.2.0"
edition = "2021"
license = "MPL-2.0"

[dependencies]
hal-arch-trait  = { path = "../../traits/arch", version = "0.1.0" }
hal-uart        = { path = "../../traits/uart", version = "0.1.0" }
hal-timer       = { path = "../../traits/timer", version = "0.1.0" }
hal-interrupt   = { path = "../../traits/interrupt", version = "0.1.0" }
hal-paging      = { path = "../../traits/paging", version = "0.1.0" }
hal-hypervisor  = { path = "../../traits/hypervisor", version = "0.1.0" }
types = { path = "../../../libs/types", version = "0.1.0" }
riscv = "0.16.0"
critical-section = { version = "1", optional = true, features = ["restore-state-usize"] }

[build-dependencies]
cc = "1.0"

[features]
default = []
critical-section-impl = ["dep:critical-section"]

[lib]
crate-type = ["rlib"]
